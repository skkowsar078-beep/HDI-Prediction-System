<!DOCTYPE html>
<html lang="en">

<head>

<title>HDI Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body class="login-bg">


<div class="login-box">


<h1>🌍 HDI Prediction System</h1>

<p>Login to continue</p>


<form action="/login" method="POST">


<input 
type="text" 
name="username"
placeholder="Enter Username"
required>


<input 
type="password"
id="password"
name="password"
placeholder="Enter Password"
required>


<label>
<input type="checkbox" onclick="showPassword()">
Show Password
</label>


<br><br>


<button type="submit">
Login
</button>


</form>


<a href="/">
← Back to Home
</a>


</div>



<script>

function showPassword(){

let pass = document.getElementById("password");


if(pass.type === "password"){

pass.type = "text";

}

else{

pass.type = "password";

}

}

</script>


</body>

</html>
